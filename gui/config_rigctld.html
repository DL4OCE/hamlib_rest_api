<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamlib REST API Manager</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; }
        h1 { color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #4A5568; color: white; }
        .status { font-weight: bold; padding: 4px 8px; border-radius: 4px; }
        .running { background: #C6F6D5; color: #22543D; }
        .stopped { background: #FED7D7; color: #742A2A; }
        button { padding: 6px 12px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .btn-start { background: #48BB78; color: white; }
        .btn-stop { background: #E53E3E; color: white; }
        button:disabled { background: #CBD5E0; cursor: not-allowed; }
    </style>
</head>
<body>

    <h1>rigs (rigctld)</h1>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Model</th>
                <th>Device</th>
                <th>Port</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="rigs-tbody">
            <tr>
                <td colspan="6">Loading transceivers...</td>
            </tr>
        </tbody>
    </table>

    <script>
        // Fetch and render the transceiver list
        async function loadRigs() {
            try {
                const response = await fetch('/trxs');
                if (!response.ok) throw new Error('Network response was not ok');
                const rigs = await response.json();
                
                const tbody = document.getElementById('rigs-tbody');
                tbody.innerHTML = '';

                if (rigs.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6">No rigs configured.</td></tr>';
                    return;
                }

                rigs.forEach(rig => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${rig.id}</td>
                        <td>${rig.model}</td>
                        <td>${rig.device}</td>
                        <td>${rig.port}</td>
                        <td>
                            <span class="status ${rig.is_running ? 'running' : 'stopped'}">
                                ${rig.is_running ? 'RUNNING' : 'STOPPED'}
                            </span>
                        </td>
                        <td>
                            <button class="btn-start" ${rig.is_running ? 'disabled' : ''} onclick="controlRig(${rig.id}, 'start')">Start</button>
                            <button class="btn-stop" ${!rig.is_running ? 'disabled' : ''} onclick="controlRig(${rig.id}, 'stop')">Stop</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error('Error fetching rigs:', error);
                document.getElementById('rigs-tbody').innerHTML = `<tr><td colspan="6" style="color:red;">Error loading data: ${error.message}</td></tr>`;
            }
        }

        async function controlRig(id, action) {
            try {
                const response = await fetch(`/trx/${id}/service/${action}`, { 
                    method: 'POST' 
                });
                
                const result = await response.json();
                
                if (!response.ok) {
                    alert(`Fehler: ${result.error || 'Unbekannter Fehler'}`);
                } else {
                    console.log(result.message);
                }
                
                loadRigs();
            } catch (error) {
                alert(`Verbindung zum API-Server fehlgeschlagen: ${error}`);
            }
        }

        async function loadRotators() {
            try {
                const response = await fetch('/rotators');
                if (!response.ok) throw new Error('Network response was not ok');
                const rotators = await response.json();
                
                // Target the table body inside the rotator table
                const tbody = document.querySelector('#rotator-table tbody');
                tbody.innerHTML = '';

                if (rotators.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7">No rotators configured.</td></tr>';
                    return;
                }

                rotators.forEach(rot => {
                    const isRunning = rot.status === "RUNNING";
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${rot.id}</td>
                        <td>${rot.model}</td>
                        <td>${rot.device}</td>
                        <td>${rot.port}</td>
                        <td>${rot.baudrate}</td>
                        <td>
                            <span class="status ${isRunning ? 'running' : 'stopped'}">
                                ${rot.status}
                            </span>
                        </td>
                        <td>
                            <button class="btn-start" ${isRunning ? 'disabled' : ''} onclick="controlRotator(${rot.id}, 'start')">Start</button>
                            <button class="btn-stop" ${!isRunning ? 'disabled' : ''} onclick="controlRotator(${rot.id}, 'stop')">Stop</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error('Error fetching rotators:', error);
                document.querySelector('#rotator-table tbody').innerHTML = `<tr><td colspan="7" style="color:red;">Error loading data: ${error.message}</td></tr>`;
            }
        }

        async function controlRotator(id, action) {
            try {
                const response = await fetch(`/rotator/${id}/service/${action}`, { 
                    method: 'POST' 
                });
                const result = await response.json();
                if (!response.ok) {
                    alert(`Error: ${result.error || 'Unknown error'}`);
                }
                loadRotators();            
            } catch (error) {
                alert(`Connection to API server failed: ${error}`);
            }
        }

        loadRigs();
        loadRotators();
    </script>

    <h2>rotators (rotctld)</h2>
    <table id="rotator-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Model</th>
                <th>Device</th>
                <th>Port</th>
                <th>Baudrate</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
    <button onclick="loadRigs();loadRotators();">🔄 Refresh Status</button>

</body>
</html>
